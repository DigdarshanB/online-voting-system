services:
  db:
    image: mysql:8.0
    container_name: ovs_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ovs
      MYSQL_USER: ovs_user
      MYSQL_PASSWORD: ovs_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - ovs_mysql_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: ovs_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  ovs_mysql_data:
