services:
  db:
    image: mysql:8.0
    container_name: ovs_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ovs
      MYSQL_USER: ovs_user
      MYSQL_PASSWORD: ovs_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - ovs_mysql_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: ovs_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

  # ── CompreFace face-verification stack ─────────────────────────
  compreface-postgres:
    image: postgres:13
    container_name: ovs_compreface_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: frs
      POSTGRES_USER: frs
      POSTGRES_PASSWORD: frs_password
    volumes:
      - compreface_pg_data:/var/lib/postgresql/data

  compreface-core:
    image: exadel/compreface-core:latest
    container_name: ovs_compreface_core
    restart: unless-stopped
    environment:
      ML_PORT: "3000"
      UWSGI_PROCESSES: "2"
      UWSGI_THREADS: "2"

  compreface-api:
    image: exadel/compreface-api:latest
    container_name: ovs_compreface_api
    restart: unless-stopped
    depends_on:
      - compreface-postgres
      - compreface-core
    environment:
      POSTGRES_URL: jdbc:postgresql://compreface-postgres:5432/frs
      POSTGRES_USER: frs
      POSTGRES_PASSWORD: frs_password
      SPRING_PROFILES_ACTIVE: dev
      CONNECTION_TIMEOUT: "10000"
      READ_TIMEOUT: "60000"

  compreface-admin:
    image: exadel/compreface-admin:latest
    container_name: ovs_compreface_admin
    restart: unless-stopped
    depends_on:
      - compreface-postgres
      - compreface-api
    environment:
      POSTGRES_URL: jdbc:postgresql://compreface-postgres:5432/frs
      POSTGRES_USER: frs
      POSTGRES_PASSWORD: frs_password
      SPRING_PROFILES_ACTIVE: dev

  compreface-fe:
    image: exadel/compreface-fe:latest
    container_name: ovs_compreface_fe
    restart: unless-stopped
    depends_on:
      - compreface-api
      - compreface-admin
    ports:
      - "8200:80"

volumes:
  ovs_mysql_data:
  compreface_pg_data:
